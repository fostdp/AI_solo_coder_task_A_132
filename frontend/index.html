<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代水运仪象台漏壶水力精度仿真系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimSun', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-bottom: 2px solid #c9a227;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            color: #c9a227;
            text-shadow: 0 0 10px rgba(201, 162, 39, 0.5);
        }

        .header .subtitle {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #44ff44;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        .canvas-container {
            flex: 1;
            position: relative;
        }

        #three-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .side-panel {
            width: 380px;
            background: rgba(0, 0, 0, 0.5);
            border-left: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(201, 162, 39, 0.2);
        }

        .panel-section h3 {
            color: #c9a227;
            font-size: 16px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.3);
        }

        .clepsydra-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #c9a227;
        }

        .clepsydra-card.warning {
            border-left-color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
        }

        .clepsydra-card.critical {
            border-left-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            animation: alertPulse 1s infinite;
        }

        @keyframes alertPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 68, 68, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 68, 68, 0.8); }
        }

        .clepsydra-name {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
            font-size: 12px;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
        }

        .data-label {
            color: #888;
        }

        .data-value {
            color: #c9a227;
            font-family: 'Courier New', monospace;
        }

        .water-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .water-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e90ff, #00bfff);
            border-radius: 4px;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(30, 144, 255, 0.5);
        }

        .alert-panel {
            max-height: 200px;
            overflow-y: auto;
        }

        .alert-item {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .alert-item.warning {
            background: rgba(255, 170, 0, 0.2);
            border-color: #ffaa00;
        }

        .alert-time {
            color: #888;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .alert-message {
            color: #fff;
        }

        .metrics-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 12px;
            border-bottom: 1px dashed #333;
        }

        .metrics-row:last-child {
            border-bottom: none;
        }

        .metrics-label {
            color: #aaa;
        }

        .metrics-value {
            color: #00bfff;
            font-family: 'Courier New', monospace;
        }

        .metrics-value.error {
            color: #ff6666;
        }

        .metrics-value.good {
            color: #66ff66;
        }

        .control-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            background: rgba(201, 162, 39, 0.2);
            border: 1px solid #c9a227;
            color: #c9a227;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(201, 162, 39, 0.4);
        }

        .btn.active {
            background: #c9a227;
            color: #000;
        }

        .compensation-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }

        .compensation-badge.positive {
            background: rgba(0, 255, 0, 0.2);
            color: #66ff66;
        }

        .compensation-badge.negative {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6666;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(201, 162, 39, 0.4);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(201, 162, 39, 0.6);
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🏛️ 古代水运仪象台 - 漏壶水力精度仿真系统</h1>
            <div class="subtitle">宋代苏颂水运仪象台四级漏壶复原研究 | 水力仿真 · 误差补偿 · 实时监测</div>
        </div>
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">未连接</span>
        </div>
    </div>

    <div class="main-container">
        <div class="canvas-container">
            <canvas id="three-canvas"></canvas>
        </div>

        <div class="side-panel">
            <div class="panel-section">
                <h3>📊 系统状态</h3>
                <div class="control-panel">
                    <button class="btn active" id="btnRotate">自动旋转</button>
                    <button class="btn" id="btnParticles">水流粒子</button>
                    <button class="btn active" id="btnLabels">水位标注</button>
                </div>
            </div>

            <div class="panel-section">
                <h3>⏱️ 日计时误差</h3>
                <div id="dailyErrorPanel" style="font-size: 24px; text-align: center; color: #66ff66; font-family: 'Courier New', monospace; padding: 10px;">
                    0.00 秒
                </div>
                <div style="font-size: 12px; color: #888; text-align: center;">
                    目标: 小于60秒 / 日
                </div>
            </div>

            <div class="panel-section">
                <h3>🏺 四级漏壶状态</h3>
                <div id="clepsydraList"></div>
            </div>

            <div class="panel-section">
                <h3>📐 水力精度指标</h3>
                <div id="metricsPanel">
                    <div class="metrics-row">
                        <span class="metrics-label">理论流量</span>
                        <span class="metrics-value" id="metricTheoretical">- mL/s</span>
                    </div>
                    <div class="metrics-row">
                        <span class="metrics-label">实际流量</span>
                        <span class="metrics-value" id="metricActual">- mL/s</span>
                    </div>
                    <div class="metrics-row">
                        <span class="metrics-label">流量误差</span>
                        <span class="metrics-value error" id="metricError">- %</span>
                    </div>
                    <div class="metrics-row">
                        <span class="metrics-label">蒸发速率</span>
                        <span class="metrics-value" id="metricEvap">- mL/s</span>
                    </div>
                    <div class="metrics-row">
                        <span class="metrics-label">PID补偿量</span>
                        <span class="metrics-value" id="metricComp">-</span>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>🚨 告警信息</h3>
                <div class="alert-panel" id="alertPanel">
                    <div style="color: #666; font-size: 12px; text-align: center; padding: 20px;">
                        暂无告警
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { WaterParticles } from './src/particles.js';
        import { ClepsydraScene } from './src/clepsydra.js';

        const canvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 50, 200);

        const camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
        camera.position.set(40, 30, 50);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 20;
        controls.maxDistance = 150;
        controls.maxPolarAngle = Math.PI / 2.1;

        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(30, 50, 30);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 200;
        mainLight.shadow.camera.left = -60;
        mainLight.shadow.camera.right = 60;
        mainLight.shadow.camera.top = 60;
        mainLight.shadow.camera.bottom = -60;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-30, 20, -30);
        scene.add(fillLight);

        const groundGeometry = new THREE.CircleGeometry(80, 64);
        const groundMaterial = new THREE.MeshStandardMaterial({
            color: 0x2a2a3a,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(80, 40, 0x333355, 0x222244);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const clepsydraScene = new ClepsydraScene(scene);
        const waterParticles = new WaterParticles(scene);

        let autoRotate = true;
        let showParticles = false;
        let showLabels = true;

        const clepsydraData = {
            KD1: { name: '天上壶', water_level: 100, flow_rate: 2.5, water_temp: 20, humidity: 60, quality: 1.0, max_level: 120, min_level: 20 },
            KD2: { name: '夜漏壶', water_level: 85, flow_rate: 2.5, water_temp: 20, humidity: 60, quality: 1.0, max_level: 100, min_level: 15 },
            KD3: { name: '平水壶', water_level: 65, flow_rate: 2.5, water_temp: 20, humidity: 60, quality: 1.0, max_level: 80, min_level: 10 },
            KD4: { name: '万分水', water_level: 50, flow_rate: 2.5, water_temp: 20, humidity: 60, quality: 1.0, max_level: 60, min_level: 5 },
        };

        const metricsData = {
            KD1: { theoretical_flow: 2.5, actual_flow: 2.5, flow_error: 0, evaporation_rate: 0.01, daily_error_seconds: 0, compensation_flow: 0 }
        };

        const alerts = [];

        function updateUI() {
            const list = document.getElementById('clepsydraList');
            list.innerHTML = '';

            for (const [id, data] of Object.entries(clepsydraData)) {
                const metrics = metricsData[id] || { daily_error_seconds: 0, compensation_flow: 0 };
                const levelPercent = ((data.water_level - data.min_level) / (data.max_level - data.min_level)) * 100;
                const hasAlert = alerts.some(a => a.clepsydra_id === id && !a.resolved);
                const criticalAlert = alerts.some(a => a.clepsydra_id === id && a.alert_level === 'CRITICAL' && !a.resolved);

                const cardClass = criticalAlert ? 'critical' : (hasAlert ? 'warning' : '');

                const card = document.createElement('div');
                card.className = `clepsydra-card ${cardClass}`;
                card.innerHTML = `
                    <div class="clepsydra-name">${data.name} <span style="font-size: 11px; color: #888;">(${id})</span></div>
                    <div class="data-grid">
                        <div class="data-item">
                            <span class="data-label">水位</span>
                            <span class="data-value">${data.water_level.toFixed(2)}cm</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">流量</span>
                            <span class="data-value">${data.flow_rate.toFixed(4)}mL/s</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">水温</span>
                            <span class="data-value">${data.water_temp.toFixed(1)}°C</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">湿度</span>
                            <span class="data-value">${data.humidity.toFixed(1)}%</span>
                        </div>
                    </div>
                    <div class="water-bar">
                        <div class="water-bar-fill" style="width: ${Math.min(100, Math.max(0, levelPercent))}%"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px;">
                        <span style="color: #888;">日误差: <span style="color: ${Math.abs(metrics.daily_error_seconds) > 60 ? '#ff6666' : '#66ff66'};">${metrics.daily_error_seconds.toFixed(2)}s</span></span>
                        <span class="compensation-badge ${metrics.compensation_flow >= 0 ? 'positive' : 'negative'}">
                            PID: ${metrics.compensation_flow >= 0 ? '+' : ''}${metrics.compensation_flow.toFixed(3)}
                        </span>
                    </div>
                `;
                list.appendChild(card);
            }

            const totalError = Object.values(metricsData).reduce((sum, m) => sum + (m.daily_error_seconds || 0), 0);
            const errorEl = document.getElementById('dailyErrorPanel');
            errorEl.textContent = `${total_error.toFixed(2)} 秒`;
            errorEl.style.color = Math.abs(totalError) > 60 ? '#ff6666' : '#66ff66';

            const mainMetrics = metricsData['KD3'] || metricsData['KD1'] || {};
            document.getElementById('metricTheoretical').textContent = `${(mainMetrics.theoretical_flow || 0).toFixed(4)} mL/s`;
            document.getElementById('metricActual').textContent = `${(mainMetrics.actual_flow || 0).toFixed(4)} mL/s`;
            document.getElementById('metricError').textContent = `${(mainMetrics.flow_error || 0).toFixed(3)} %`;
            document.getElementById('metricEvap').textContent = `${(mainMetrics.evaporation_rate || 0).toFixed(5)} mL/s`;

            const comp = mainMetrics.compensation_flow || 0;
            document.getElementById('metricComp').textContent = `${comp >= 0 ? '+' : ''}${comp.toFixed(4)} mL/s`;
            document.getElementById('metricComp').className = `metrics-value ${comp >= 0 ? 'good' : 'error'}`;
        }

        function updateAlerts() {
            const panel = document.getElementById('alertPanel');
            if (alerts.length === 0) {
                panel.innerHTML = '<div style="color: #666; font-size: 12px; text-align: center; padding: 20px;">暂无告警</div>';
                return;
            }

            panel.innerHTML = '';
            const activeAlerts = alerts.filter(a => !a.resolved).slice(-5).reverse();
            for (const alert of activeAlerts) {
                const level = alert.alert_level?.toLowerCase() || 'warning';
                const item = document.createElement('div');
                item.className = `alert-item ${level}`;
                const time = new Date(alert.timestamp).toLocaleTimeString('zh-CN');
                item.innerHTML = `
                    <div class="alert-time">${time} · ${alert.clepsydra_id}</div>
                    <div class="alert-message">${alert.message}</div>
                `;
                panel.appendChild(item);
            }
        }

        let ws = null;
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            try {
                ws = new WebSocket(wsUrl);
            } catch (e) {
                ws = new WebSocket('ws://localhost:8080/ws');
            }

            ws.onopen = function() {
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('statusText').textContent = '已连接';
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    handleWsMessage(data);
                } catch (e) {
                    console.error('解析WebSocket消息失败:', e);
                }
            };

            ws.onclose = function() {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = '连接断开';
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = function() {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = '连接错误';
            };
        }

        function handleWsMessage(data) {
            if (data.type === 'SensorData' && data.data) {
                const sensor = data.data;
                if (clepsydraData[sensor.clepsydra_id]) {
                    clepsydraData[sensor.clepsydra_id].water_level = sensor.water_level;
                    clepsydraData[sensor.clepsydra_id].flow_rate = sensor.flow_rate;
                    clepsydraData[sensor.clepsydra_id].water_temp = sensor.water_temp;
                    clepsydraData[sensor.clepsydra_id].humidity = sensor.humidity;
                    clepsydraData[sensor.clepsydra_id].quality = sensor.quality;

                    const config = clepsydraData[sensor.clepsydra_id];
                    const levelRatio = (sensor.water_level - config.min_level) / (config.max_level - config.min_level);
                    clepsydraScene.updateWaterLevel(sensor.clepsydra_id, levelRatio);

                    if (showParticles && sensor.flow_rate > 0) {
                        const idx = ['KD1', 'KD2', 'KD3', 'KD4'].indexOf(sensor.clepsydra_id);
                        if (idx >= 0 && idx < 3) {
                            waterParticles.setFlowRate(idx, sensor.flow_rate / 2.5);
                        }
                    }
                }
                updateUI();
            } else if (data.type === 'HydraulicMetrics' && data.data) {
                const metrics = data.data;
                metricsData[metrics.clepsydra_id] = metrics;
                updateUI();
            } else if (data.type === 'Alert' && data.data) {
                alerts.push(data.data);
                if (alerts.length > 50) alerts.shift();
                updateAlerts();
                updateUI();
            }
        }

        document.getElementById('btnRotate').addEventListener('click', function() {
            autoRotate = !autoRotate;
            this.classList.toggle('active', autoRotate);
        });

        document.getElementById('btnParticles').addEventListener('click', function() {
            showParticles = !showParticles;
            this.classList.toggle('active', showParticles);
            waterParticles.setVisible(showParticles);
        });

        document.getElementById('btnLabels').addEventListener('click', function() {
            showLabels = !showLabels;
            this.classList.toggle('active', showLabels);
            clepsydraScene.setLabelsVisible(showLabels);
        });

        function onResize() {
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        }
        window.addEventListener('resize', onResize);

        let lastTime = 0;
        function animate(currentTime) {
            requestAnimationFrame(animate);

            const delta = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            if (autoRotate) {
                const angle = delta * 0.1;
                const radius = camera.position.length();
                camera.position.x = Math.cos(angle * Math.PI) * radius * 0.7 + camera.position.x * 0.3;
                camera.position.z = Math.sin(angle * Math.PI) * radius * 0.7 + camera.position.z * 0.3;
                controls.update();
            }

            waterParticles.update(delta);
            clepsydraScene.update(delta);

            renderer.render(scene, camera);
        }

        updateUI();
        updateAlerts();
        connectWebSocket();
        animate(0);

        setTimeout(() => {
            if (ws?.readyState !== WebSocket.OPEN) {
                for (let i = 0; i < 50; i++) {
                    setTimeout(() => {
                        for (const id of ['KD1', 'KD2', 'KD3', 'KD4']) {
                            const data = clepsydraData[id];
                            if (data) {
                                const config = data;
                                const levelRatio = (data.water_level - config.min_level) / (config.max_level - config.min_level);
                                clepsydraScene.updateWaterLevel(id, levelRatio);
                            }
                        }
                    }, i * 100);
                }
            }
        }, 1000);
    </script>
</body>
</html>
